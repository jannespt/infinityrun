<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Surfer - Gem & Coin Edition</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            background: black;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = 420;
        canvas.height = 650;

        // Spielzustand & PERSISTENTE DATEN
        let player = { lane: 1, visualX: 1, laneWidth: canvas.width / 3, y: 530, width: 40, height: 60, tilt: 0 };
        let obstacles = [], coins = [], particles = [], stars = [], powerUps = [], gems = [];
        let score = 0, speed = 5, gameOver = false, isPaused = false, frameCount = 0;
        let shakeTime = 0;
        
        // Highscore, GEMS UND COINS aus dem LocalStorage laden
        let highscore = parseInt(localStorage.getItem("surferHighscore")) || 0;
        let gemScore = parseInt(localStorage.getItem("surferGems")) || 0; 
        let coinScore = parseInt(localStorage.getItem("surferCoins")) || 0; // NEU: Coins laden
        
        let activePowerUps = { shield: 0, magnet: 0, boost: 0 };

        for(let i = 0; i < 60; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speedMult: Math.random() * 0.5 + 0.5 });
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && !gameOver) isPaused = !isPaused;
            
            if (!gameOver && !isPaused) {
                if ((e.key === "a" || e.key === "ArrowLeft") && player.lane > 0) player.lane--;
                if ((e.key === "d" || e.key === "ArrowRight") && player.lane < 2) player.lane++;
            } else if (gameOver) {
                if (e.key === " " || e.key === "Enter") restart();
                if ((e.key === "r" || e.key === "R") && gemScore >= 5) revive();
            }
        });

        // Speicher-Funktionen
        function saveGems() {
            localStorage.setItem("surferGems", gemScore);
        }

        function saveCoins() {
            localStorage.setItem("surferCoins", coinScore); // NEU: Coins speichern
        }

        function revive() {
            gemScore -= 5;
            saveGems(); 
            gameOver = false;
            obstacles = obstacles.filter(obs => obs.y < 200 || obs.y > 600);
            activePowerUps.shield = 180; 
            createParticles(player.visualX * player.laneWidth + 70, player.y + 30, "#e011ff", 40);
        }

        function createParticles(x, y, color, count = 10) {
            for(let i = 0; i < count; i++) {
                particles.push({ 
                    x, y, 
                    vx: (Math.random() - 0.5) * 10, 
                    vy: (Math.random() - 0.5) * 10, 
                    life: 1.0, color, 
                    size: Math.random() * 4 + 1 
                });
            }
        }

        function spawnEntity() {
            let lane = Math.floor(Math.random() * 3);
            let rand = Math.random();
            
            if (rand < 0.05) { 
                const types = [
                    { type: 'shield', color: '#00AAFF' },
                    { type: 'magnet', color: '#FF00FF' },
                    { type: 'boost', color: '#00FFFF' }
                ];
                let p = types[Math.floor(Math.random() * types.length)];
                powerUps.push({ x: lane, y: -50, type: p.type, color: p.color, pulse: 0 });
            } else if (rand < 0.08) { 
                gems.push({ x: lane, y: -50, size: 15, rot: 0 });
            } else if (rand < 0.25) {
                coins.push({ x: lane, y: -50, radius: 12, pulse: 0 });
            } else {
                obstacles.push({ x: lane, y: -80, width: 70, height: 40 });
            }
        }

        function restart() {
            obstacles = []; coins = []; particles = []; powerUps = []; gems = [];
            score = 0; speed = 5; gameOver = false; isPaused = false;
            // gemScore und coinScore werden NICHT zurückgesetzt!
            player.lane = 1; player.visualX = 1;
            activePowerUps = { shield: 0, magnet: 0, boost: 0 };
        }

        function update() {
            if (isPaused && !gameOver) {
                drawPause();
                requestAnimationFrame(update);
                return;
            }

            if (gameOver) {
                drawGameOver();
                requestAnimationFrame(update);
                return;
            }

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate(Math.random() * 5 - 2.5, Math.random() * 5 - 2.5);
                shakeTime--;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "white";
            stars.forEach(star => {
                let sMult = activePowerUps.boost > 0 ? 5 : 1;
                star.y += speed * 0.3 * star.speedMult * sMult;
                if (star.y > canvas.height) star.y = 0;
                ctx.globalAlpha = star.speedMult;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1.0;

            if (activePowerUps.shield > 0) activePowerUps.shield--;
            if (activePowerUps.magnet > 0) activePowerUps.magnet--;
            if (activePowerUps.boost > 0) activePowerUps.boost--;

            frameCount++;
            player.visualX += (player.lane - player.visualX) * 0.15;
            let px = player.visualX * player.laneWidth + (player.laneWidth - player.width) / 2;
            
            drawPlayer(px);

            if (frameCount % Math.max(8, Math.floor(45 - speed)) === 0) spawnEntity();

            // Obstacles Logic
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += activePowerUps.boost > 0 ? speed * 3 : speed;
                let ox = obs.x * player.laneWidth + (player.laneWidth - obs.width) / 2;

                ctx.shadowBlur = 15; ctx.shadowColor = "#FF0044";
                ctx.fillStyle = "#200";
                ctx.fillRect(ox, obs.y, obs.width, obs.height);
                ctx.strokeStyle = "#FF0044";
                ctx.lineWidth = 2;
                ctx.strokeRect(ox, obs.y, obs.width, obs.height);

                if (obs.x === Math.round(player.visualX) && obs.y + obs.height > player.y + 10 && obs.y < player.y + player.height - 10) {
                    if (activePowerUps.boost > 0) {
                         createParticles(ox + obs.width/2, obs.y + obs.height/2, "#FF4444", 10);
                         obstacles.splice(i, 1);
                         score += 50;
                    } else if (activePowerUps.shield > 0) {
                        activePowerUps.shield = 0;
                        createParticles(px + player.width/2, player.y, "#00AAFF", 20);
                        obstacles.splice(i, 1);
                        shakeTime = 5;
                    } else {
                        createParticles(ox + obs.width/2, obs.y + obs.height/2, "#FF4444", 30);
                        shakeTime = 15;
                        gameOver = true;
                    }
                }
                if (obs.y > canvas.height) obstacles.splice(i, 1);
            }

            // Gems Logic
            for (let i = gems.length - 1; i >= 0; i--) {
                let gem = gems[i];
                gem.y += activePowerUps.boost > 0 ? speed * 3 : speed;
                gem.rot += 0.05;

                if (activePowerUps.magnet > 0) {
                    gem.x += (player.lane - gem.x) * 0.15;
                    if (gem.y > player.y) gem.y -= 5;
                }

                let gx = gem.x * player.laneWidth + player.laneWidth / 2;
                ctx.save();
                ctx.translate(gx, gem.y);
                ctx.rotate(gem.rot);
                ctx.shadowBlur = 20; ctx.shadowColor = "#e011ff";
                ctx.fillStyle = "#e011ff";
                ctx.beginPath();
                ctx.moveTo(0, -gem.size);
                ctx.lineTo(gem.size, 0);
                ctx.lineTo(0, gem.size);
                ctx.lineTo(-gem.size, 0);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = "white"; ctx.stroke();
                ctx.restore();

                if (Math.abs(gem.x - player.visualX) < 0.5 && Math.abs(gem.y - (player.y + 30)) < 60) {
                    createParticles(gx, gem.y, "#e011ff", 20);
                    gems.splice(i, 1);
                    gemScore++; 
                    score += 500;
                    saveGems();
                } else if (gem.y > canvas.height) gems.splice(i, 1);
            }

            // Coins Logic
            for (let i = coins.length - 1; i >= 0; i--) {
                let coin = coins[i];
                coin.y += activePowerUps.boost > 0 ? speed * 3 : speed;
                if (activePowerUps.magnet > 0) {
                    coin.x += (player.lane - coin.x) * 0.2;
                    if (coin.y > player.y) coin.y -= 10; 
                }
                coin.pulse += 0.1;
                let cx = coin.x * player.laneWidth + player.laneWidth / 2;
                let s = Math.sin(coin.pulse) * 3;

                ctx.shadowBlur = 20; ctx.shadowColor = "gold";
                ctx.fillStyle = "#FFD700";
                ctx.beginPath(); ctx.arc(cx, coin.y, coin.radius + s, 0, Math.PI * 2); ctx.fill();

                if (Math.abs(coin.x - player.visualX) < 0.5 && Math.abs(coin.y - (player.y + 30)) < 60) {
                    createParticles(cx, coin.y, "#FFD700", 15);
                    coins.splice(i, 1);
                    coinScore++; // Erhöhen
                    score += 100;
                    saveCoins(); // NEU: Coins sofort speichern
                } else if (coin.y > canvas.height) coins.splice(i, 1);
            }

            // Power-ups & Particles (unverändert)
            for (let i = powerUps.length - 1; i >= 0; i--) {
                let p = powerUps[i];
                p.y += speed; p.pulse += 0.05;
                let px_pos = p.x * player.laneWidth + player.laneWidth / 2;
                ctx.shadowBlur = 20; ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.save();
                ctx.translate(px_pos, p.y);
                ctx.rotate(p.pulse);
                ctx.fillRect(-15, -15, 30, 30);
                ctx.strokeStyle = "white"; ctx.strokeRect(-15, -15, 30, 30);
                ctx.restore();
                if (p.x === player.lane && Math.abs(p.y - (player.y + 30)) < 50) {
                    createParticles(px_pos, p.y, p.color, 25);
                    activePowerUps[p.type] = 400;
                    powerUps.splice(i, 1);
                } else if (p.y > canvas.height) powerUps.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            score += (activePowerUps.boost > 0 ? speed * 2 : speed) / 30;
            if (activePowerUps.boost === 0) speed += 0.0015;
            
            if (Math.floor(score) > highscore) {
                highscore = Math.floor(score);
            }

            drawUI();
            ctx.restore();
            requestAnimationFrame(update);
        }

        function drawPlayer(px) {
            ctx.save();
            ctx.translate(px + player.width/2, player.y + player.height/2);
            player.tilt = (player.lane - player.visualX) * 0.4;
            ctx.rotate(player.tilt);
            if (activePowerUps.shield > 0) {
                ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2);
                ctx.strokeStyle = "#00AAFF"; ctx.lineWidth = 3; ctx.stroke();
            }
            if (activePowerUps.boost > 0) { ctx.shadowBlur = 30; ctx.shadowColor = "#00FFFF"; }
            ctx.fillStyle = "#00FF88";
            ctx.beginPath();
            ctx.moveTo(0, -player.height/2); ctx.lineTo(player.width/2, player.height/2);
            ctx.lineTo(0, player.height/3); ctx.lineTo(-player.width/2, player.height/2);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = activePowerUps.boost > 0 ? "#FF00FF" : "#00FFFF";
            let fH = activePowerUps.boost > 0 ? 40 : 15;
            ctx.fillRect(-4, player.height/2 - 5, 8, fH + Math.random() * 10);
            ctx.restore();
        }

        function drawUI() {
            ctx.fillStyle = "white"; ctx.font = "bold 18px monospace";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + Math.floor(score), 20, 40);
            
            ctx.fillStyle = "#00FF88";
            ctx.font = "bold 14px monospace";
            ctx.fillText("BEST:  " + highscore, 20, 60);

            ctx.font = "bold 18px monospace";
            ctx.fillStyle = "#FFD700";
            ctx.fillText("COINS: " + coinScore, 20, 85);
            ctx.fillStyle = "#e011ff";
            ctx.fillText("GEMS:  " + gemScore, 20, 110);

            let yOff = 140;
            for(let key in activePowerUps) {
                if(activePowerUps[key] > 0) {
                    ctx.fillStyle = key === 'shield' ? '#00AAFF' : (key === 'magnet' ? '#FF00FF' : '#00FFFF');
                    ctx.font = "12px monospace";
                    ctx.fillText(key.toUpperCase() + ": " + Math.ceil(activePowerUps[key]/60) + "s", 20, yOff);
                    yOff += 20;
                }
            }
        }

        function drawPause() {
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px monospace";
            ctx.fillText("PAUSE", canvas.width / 2, canvas.height / 2);
        }

        function drawGameOver() {
            if (Math.floor(score) >= highscore) { 
                highscore = Math.floor(score); 
                localStorage.setItem("surferHighscore", highscore); 
            }

            ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF0044"; ctx.textAlign = "center"; ctx.font = "40px monospace";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 120);
            
            ctx.fillStyle = "white"; ctx.font = "24px monospace";
            ctx.fillText("Score: " + Math.floor(score), canvas.width / 2, canvas.height / 2 - 60);
            
            ctx.fillStyle = "#FFD700";
            ctx.fillText("Gesamt Coins: " + coinScore, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = "#e011ff";
            ctx.fillText("Gesamt Gems:  " + gemScore, canvas.width / 2, canvas.height / 2 + 20);
            
            if (gemScore >= 5) {
                ctx.fillStyle = "#00FFFF";
                ctx.font = "bold 18px monospace";
                ctx.fillText("Drücke 'R' zum Wiederbeleben", canvas.width / 2, canvas.height / 2 + 80);
                ctx.font = "14px monospace";
                ctx.fillText("(Kosten: 5 Gems)", canvas.width / 2, canvas.height / 2 + 100);
            } else {
                ctx.fillStyle = "#555";
                ctx.font = "16px monospace";
                ctx.fillText("Nicht genug Gems zum Wiederbeleben", canvas.width / 2, canvas.height / 2 + 85);
            }
            
            ctx.fillStyle = "white";
            ctx.font = "14px monospace";
            ctx.fillText("Drücke LEERTASTE für Neustart", canvas.width / 2, canvas.height / 2 + 160);
        }

        update();
    </script>
</body>
</html>
